services:
  app:
    build:
      context: .
    container_name: app
    ports:
      - "3000:3000"
    networks:
      - test-network

  test:
    build:
      context: .
    container_name: test
    working_dir: /app
    depends_on:
      - app
    networks:
      - test-network
    command: sh -c "npm install --prefix tests && npm test --prefix tests"

networks:
  test-network: