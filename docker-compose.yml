version: "3.8"

services:
  app:
    build: .
    container_name: app
    ports:
      - "3000:3000"
    networks:
      - test-network

  test:
    image: node:18
    container_name: test
    working_dir: /tests
    volumes:
      - ./tests:/tests
    depends_on:
      - app
    networks:
      - test-network
    command: sh -c "npm install && npm test"

networks:
  test-network: